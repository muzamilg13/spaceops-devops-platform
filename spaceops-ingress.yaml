apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: spaceops-ingress

spec:
  ingressClassName: nginx

  rules:
    - host: localhost

      http:
        paths:

          - path: /api
            pathType: Prefix

            backend:
              service:
                name: backend-release
                port:
                  number: 8000

          - path: /
            pathType: Prefix

            backend:
              service:
                name: frontend-release
                port:
                  number: 80